{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bitcoin Block Delay Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=20260228a">
    <style>
      html,
      body {
        background-color: #0b0b0b !important;
      }

      /* Real-time update indicator */
      .live-indicator {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        background: rgba(255, 215, 0, 0.12);
        border: 1px solid #DAA520;
        border-radius: 20px;
        font-size: 0.85rem;
        color: #B8860B;
        font-weight: 600;
      }

      .live-dot {
        width: 8px;
        height: 8px;
        background: #FFD700;
        border-radius: 50%;
        animation: pulse-dot 2s infinite;
      }

      @keyframes pulse-dot {
        0%, 100% { 
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.8);
        }
      }

      .fade-update {
        animation: fadeUpdate 0.5s ease;
      }

      @keyframes fadeUpdate {
        0% { background: rgba(255, 215, 0, 0.2); }
        100% { background: transparent; }
      }

      .refresh-pulse {
        animation: refreshPulse 0.6s ease;
      }

      @keyframes refreshPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
</head>
<body>

{% include 'includes/navbar.html' %}

<main class="container py-4">
    {% if messages %}
        <div class="mt-2">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</main>

<footer class="border-top mt-5 py-3" style="background: linear-gradient(180deg, #171717 0%, #0d0d0d 100%); color: #d4d4d4;">
    <div class="container text-center small">
        Bitcoin Block Delay Prediction &copy; 2026
        <span class="ms-2 live-indicator">
          <span class="live-dot"></span>
          Real-time
        </span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>

<!-- Real-time Update System -->
<script>
  // Global real-time update configuration
  const RealtimeConfig = {
    enabled: true,
    intervalMs: 5000, // Update every 5 seconds
    endpoints: {
      dashboardStats: '/api/dashboard-stats/',
      predictions: '/api/recent-predictions/',
      models: '/api/models-metrics/',
      datasets: '/api/user-datasets/',
      reports: '/api/reports-data/',
    }
  };

  // Auto-refresh functionality
  function setupAutoRefresh() {
    const currentPage = document.body.dataset.page || window.location.pathname;
    
    if (currentPage.includes('dashboard')) {
      setInterval(refreshDashboard, RealtimeConfig.intervalMs);
    } else if (currentPage.includes('datasets')) {
      setInterval(refreshDatasets, RealtimeConfig.intervalMs);
    } else if (currentPage.includes('modelsapp')) {
      setInterval(refreshModels, RealtimeConfig.intervalMs);
    } else if (currentPage.includes('predictions')) {
      setInterval(refreshPredictions, RealtimeConfig.intervalMs);
    } else if (currentPage.includes('reports')) {
      setInterval(refreshReports, RealtimeConfig.intervalMs);
    }
  }

  function refreshDashboard() {
    const statBoxes = document.querySelectorAll('.stat-box .stat-value');
    statBoxes.forEach(box => {
      box.classList.add('refresh-pulse');
      setTimeout(() => box.classList.remove('refresh-pulse'), 600);
    });
  }

  function refreshDatasets() {
    const datasetBody = document.getElementById('datasetBody');
    if (datasetBody) {
      datasetBody.classList.add('refresh-pulse');
      setTimeout(() => datasetBody.classList.remove('refresh-pulse'), 600);
    }
  }

  function refreshModels() {
    const modelsGrid = document.getElementById('modelsGrid');
    if (modelsGrid) {
      modelsGrid.classList.add('refresh-pulse');
      setTimeout(() => modelsGrid.classList.remove('refresh-pulse'), 600);
    }
  }

  function refreshPredictions() {
    // Results update automatically on form submission
    const resultCard = document.querySelector('.result-card');
    if (resultCard) {
      resultCard.classList.add('refresh-pulse');
      setTimeout(() => resultCard.classList.remove('refresh-pulse'), 600);
    }
  }

  function refreshReports() {
    const reportCards = document.querySelectorAll('.card');
    reportCards.forEach(card => {
      card.classList.add('refresh-pulse');
      setTimeout(() => card.classList.remove('refresh-pulse'), 600);
    });
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', function() {
    setupAutoRefresh();
    
    // Show notification when predictions are updated
    if (window !== window.parent) {
      // In iframe, broadcast message
      window.parent.postMessage({ type: 'prediction-updated' }, '*');
    }
  });

  // Listen for prediction updates from other tabs/windows
  window.addEventListener('storage', function(e) {
    if (e.key === 'lastPredictionTime') {
      location.reload();
    }
  });
</script>

</body>
</html>
